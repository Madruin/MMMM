<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrono CCG — The Braided Path</title>
    <style>
        /* ── CSS Reset & Base ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0f;
            --bg-card: #12121a;
            --bg-card-hover: #1a1a26;
            --text: #c8c8d4;
            --text-dim: #6e6e80;
            --text-bright: #e8e8f0;
            --accent: #4a7cff;
            --accent-glow: rgba(74, 124, 255, 0.3);
            --border: #2a2a3a;
            --gold: #d4a843;
            --gold-glow: rgba(212, 168, 67, 0.3);
            --chrome: #a8b4c8;
            --green: #4aad6a;
            --purple: #8a5ec8;
            --orange: #d48a3a;
            --red: #c84a4a;
            --blue: #3a6ad4;
            --flux-color: #ff6b4a;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.7;
            overflow-x: hidden;
        }

        /* ── Layout ── */
        #game-container {
            max-width: 760px;
            margin: 0 auto;
            padding: 20px 24px 80px;
            min-height: 100vh;
        }

        /* ── Header / Status Bar ── */
        #header {
            text-align: center;
            padding: 30px 0 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }

        #header h1 {
            font-size: 1.4rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            color: var(--text-bright);
            text-transform: uppercase;
        }

        #header .subtitle {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 4px;
            letter-spacing: 0.08em;
        }

        #status-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .stat {
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 0.05em;
        }

        .stat-value {
            color: var(--text);
            font-weight: 600;
        }

        .stat-flux .stat-value { color: var(--flux-color); }
        .stat-knowledge .stat-value { color: var(--accent); }

        /* ── Location Badge ── */
        #location-badge {
            text-align: center;
            margin-bottom: 24px;
        }

        #location-badge .location-name {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-dim);
            padding: 4px 16px;
            border: 1px solid var(--border);
            border-radius: 20px;
            display: inline-block;
        }

        /* ── Narrative Text ── */
        #narrative {
            margin-bottom: 32px;
        }

        .narrative-block {
            margin-bottom: 20px;
            animation: fadeIn 0.6s ease;
        }

        .narrative-block p {
            margin-bottom: 12px;
            color: var(--text);
        }

        .narrative-block .flavor {
            font-style: italic;
            color: var(--text-dim);
            border-left: 2px solid var(--border);
            padding-left: 16px;
            margin: 16px 0;
        }

        .narrative-block .speaker {
            color: var(--text-bright);
            font-weight: 600;
            margin-bottom: 2px;
        }

        .narrative-block .dialogue {
            color: var(--text);
            padding-left: 12px;
            border-left: 2px solid var(--accent);
            margin-bottom: 12px;
        }

        .narrative-block .system-message {
            color: var(--accent);
            font-size: 0.85rem;
            text-align: center;
            padding: 12px;
            border: 1px solid rgba(74, 124, 255, 0.2);
            border-radius: 8px;
            background: rgba(74, 124, 255, 0.05);
            margin: 16px 0;
        }

        .narrative-block .lore-note {
            color: var(--gold);
            font-size: 0.82rem;
            padding: 10px 14px;
            border: 1px solid rgba(212, 168, 67, 0.2);
            border-radius: 8px;
            background: rgba(212, 168, 67, 0.04);
            margin: 14px 0;
        }

        /* ── Choices ── */
        #choices {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 30px;
        }

        .choice-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 18px;
            color: var(--text);
            text-align: left;
            cursor: pointer;
            transition: all 0.25s ease;
            font-size: 0.92rem;
            line-height: 1.5;
        }

        .choice-btn:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent);
            box-shadow: 0 0 12px var(--accent-glow);
            color: var(--text-bright);
            transform: translateX(4px);
        }

        .choice-btn .choice-label {
            display: block;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .choice-btn .choice-hint {
            font-size: 0.78rem;
            color: var(--text-dim);
        }

        .choice-btn:hover .choice-hint {
            color: var(--text);
        }

        /* Faction-colored choice highlights */
        .choice-btn.faction-singularity:hover { border-color: var(--chrome); box-shadow: 0 0 12px rgba(168,180,200,0.3); }
        .choice-btn.faction-lifeblood:hover { border-color: var(--green); box-shadow: 0 0 12px rgba(74,173,106,0.3); }
        .choice-btn.faction-sungrace:hover { border-color: var(--orange); box-shadow: 0 0 12px rgba(212,138,58,0.3); }
        .choice-btn.faction-silence:hover { border-color: var(--purple); box-shadow: 0 0 12px rgba(138,94,200,0.3); }
        .choice-btn.faction-splintergleam:hover { border-color: var(--gold); box-shadow: 0 0 12px var(--gold-glow); }
        .choice-btn.faction-phasetide:hover { border-color: var(--blue); box-shadow: 0 0 12px rgba(58,106,212,0.3); }

        /* ── Inventory Sidebar (toggle) ── */
        #inventory-toggle {
            position: fixed;
            top: 16px;
            right: 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            z-index: 100;
            transition: all 0.2s;
        }

        #inventory-toggle:hover {
            color: var(--text);
            border-color: var(--accent);
        }

        #inventory-panel {
            position: fixed;
            top: 0;
            right: -320px;
            width: 300px;
            height: 100vh;
            background: var(--bg-card);
            border-left: 1px solid var(--border);
            padding: 60px 20px 20px;
            overflow-y: auto;
            transition: right 0.3s ease;
            z-index: 99;
        }

        #inventory-panel.open {
            right: 0;
        }

        #inventory-panel h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-dim);
            margin-bottom: 16px;
        }

        .inv-section { margin-bottom: 24px; }

        .inv-item {
            font-size: 0.82rem;
            color: var(--text);
            padding: 6px 0;
            border-bottom: 1px solid rgba(42, 42, 58, 0.5);
        }

        .inv-item .inv-label { color: var(--text-dim); }

        .reputation-bar {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin-top: 4px;
            overflow: hidden;
        }

        .reputation-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        .rep-singularity { background: var(--chrome); }
        .rep-lifeblood { background: var(--green); }
        .rep-sungrace { background: var(--orange); }
        .rep-silence { background: var(--purple); }
        .rep-splintergleam { background: var(--gold); }
        .rep-phasetide { background: var(--blue); }

        /* ── Save/Load bar ── */
        #save-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            padding: 10px 20px;
            display: flex;
            justify-content: center;
            gap: 12px;
            z-index: 100;
        }

        .save-btn {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 16px;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.72rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .save-btn:hover {
            color: var(--text);
            border-color: var(--accent);
        }

        /* ── Notification toast ── */
        #toast {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--bg-card);
            border: 1px solid var(--accent);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.82rem;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 200;
            pointer-events: none;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ── Animations ── */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 8px var(--accent-glow); }
            50% { box-shadow: 0 0 20px var(--accent-glow); }
        }

        /* ── Scene transition ── */
        .scene-transition {
            animation: fadeIn 0.5s ease;
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            #game-container { padding: 14px 16px 80px; }
            #header h1 { font-size: 1.1rem; }
            .choice-btn { padding: 12px 14px; }
            #inventory-panel { width: 260px; }
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
    </style>
</head>
<body>

<div id="game-container">
    <div id="header">
        <h1>The Braided Path</h1>
        <div class="subtitle">A Chrono CCG Narrative</div>
        <div id="status-bar"></div>
    </div>
    <div id="location-badge"><span class="location-name" id="location-name">...</span></div>
    <div id="narrative"></div>
    <div id="choices"></div>
</div>

<button id="inventory-toggle" onclick="toggleInventory()">Journal</button>
<div id="inventory-panel"></div>

<div id="save-bar">
    <button class="save-btn" onclick="saveGame()">Save</button>
    <button class="save-btn" onclick="loadGame()">Load</button>
    <button class="save-btn" onclick="restartGame()">Restart</button>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════
//  CORE ENGINE
// ═══════════════════════════════════════════════════════════════

const GameState = {
    currentScene: 'threshold_awaken',
    flux: 0,
    knowledge: 0,
    reputation: {
        singularity: 0,
        lifeblood: 0,
        sungrace: 0,
        silence: 0,
        splintergleam: 0,
        phasetide: 0
    },
    inventory: [],
    flags: {},
    history: [],
    sceneCount: 0
};

function deepCopy(obj) {
    return JSON.parse(JSON.stringify(obj));
}

let state = deepCopy(GameState);

// ── Toast notification ──
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Save / Load ──
function saveGame() {
    localStorage.setItem('chrono_save', JSON.stringify(state));
    showToast('Progress saved.');
}

function loadGame() {
    const data = localStorage.getItem('chrono_save');
    if (data) {
        state = JSON.parse(data);
        renderScene(state.currentScene);
        showToast('Progress loaded.');
    } else {
        showToast('No save found.');
    }
}

function restartGame() {
    if (confirm('Restart from the beginning? All progress will be lost.')) {
        state = deepCopy(GameState);
        localStorage.removeItem('chrono_save');
        renderScene(state.currentScene);
    }
}

// ── State helpers ──
function setFlag(key, val) { state.flags[key] = val !== undefined ? val : true; }
function getFlag(key) { return state.flags[key]; }
function addItem(item) { if (!state.inventory.includes(item)) state.inventory.push(item); }
function hasItem(item) { return state.inventory.includes(item); }
function addFlux(n) { state.flux += n; }
function addKnowledge(n) { state.knowledge += n; }
function addRep(faction, n) {
    state.reputation[faction] = Math.max(0, Math.min(100, (state.reputation[faction] || 0) + n));
}

// ── Inventory panel ──
function toggleInventory() {
    document.getElementById('inventory-panel').classList.toggle('open');
    renderInventory();
}

function renderInventory() {
    const panel = document.getElementById('inventory-panel');
    let html = '<h3>Journal</h3>';

    // Items
    html += '<div class="inv-section"><h3>Items</h3>';
    if (state.inventory.length === 0) {
        html += '<div class="inv-item" style="color:var(--text-dim)">Nothing yet.</div>';
    } else {
        state.inventory.forEach(item => {
            html += `<div class="inv-item">${item}</div>`;
        });
    }
    html += '</div>';

    // Reputation
    html += '<div class="inv-section"><h3>Reputation</h3>';
    const factionNames = {
        singularity: 'Singularity',
        lifeblood: 'Lifeblood',
        sungrace: 'Sungrace',
        silence: 'Silence',
        splintergleam: 'Splintergleam',
        phasetide: 'Phasetide'
    };
    for (const [key, label] of Object.entries(factionNames)) {
        const val = state.reputation[key] || 0;
        if (val > 0 || getFlag('met_' + key)) {
            html += `<div class="inv-item">
                <span class="inv-label">${label}</span> <span style="float:right">${val}</span>
                <div class="reputation-bar"><div class="reputation-fill rep-${key}" style="width:${val}%"></div></div>
            </div>`;
        }
    }
    html += '</div>';

    // Flags / Lore
    const loreFlags = Object.keys(state.flags).filter(k => k.startsWith('lore_'));
    if (loreFlags.length > 0) {
        html += '<div class="inv-section"><h3>Lore Discovered</h3>';
        loreFlags.forEach(f => {
            html += `<div class="inv-item" style="font-size:0.78rem">${state.flags[f]}</div>`;
        });
        html += '</div>';
    }

    panel.innerHTML = html;
}

// ── Status bar ──
function renderStatusBar() {
    const bar = document.getElementById('status-bar');
    bar.innerHTML = `
        <span class="stat stat-flux">Flux: <span class="stat-value">${state.flux}</span></span>
        <span class="stat stat-knowledge">Knowledge: <span class="stat-value">${state.knowledge}</span></span>
    `;
}

// ── Scene renderer ──
function renderScene(sceneId) {
    state.currentScene = sceneId;
    state.sceneCount++;

    const scene = SCENES[sceneId];
    if (!scene) {
        console.error('Scene not found:', sceneId);
        return;
    }

    // Run scene setup if it has one
    if (scene.onEnter) scene.onEnter();

    // Location
    document.getElementById('location-name').textContent = scene.location || '???';

    // Narrative
    const narrativeEl = document.getElementById('narrative');
    narrativeEl.innerHTML = '';
    const block = document.createElement('div');
    block.className = 'narrative-block scene-transition';
    block.innerHTML = typeof scene.text === 'function' ? scene.text() : scene.text;
    narrativeEl.appendChild(block);

    // Choices
    const choicesEl = document.getElementById('choices');
    choicesEl.innerHTML = '';

    let choices = scene.choices;
    if (typeof choices === 'function') choices = choices();

    if (choices && choices.length > 0) {
        choices.forEach(choice => {
            // Check conditional
            if (choice.condition && !choice.condition()) return;

            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            if (choice.faction) btn.classList.add('faction-' + choice.faction);

            let inner = '';
            if (choice.label) inner += `<span class="choice-label">${choice.label}</span>`;
            if (choice.hint) inner += `<span class="choice-hint">${choice.hint}</span>`;
            btn.innerHTML = inner || choice.text || '...';

            btn.addEventListener('click', () => {
                if (choice.onChoose) choice.onChoose();
                if (choice.next) renderScene(choice.next);
            });

            choicesEl.appendChild(btn);
        });
    }

    renderStatusBar();
    renderInventory();

    // Scroll to top of narrative
    window.scrollTo({ top: 0, behavior: 'smooth' });
}


// ═══════════════════════════════════════════════════════════════
//  SCENES — STAGE 1: THE THRESHOLD
// ═══════════════════════════════════════════════════════════════

const SCENES = {};

// ── 1.1: Awakening ──
SCENES['threshold_awaken'] = {
    location: 'The Threshold',
    text: `
        <p>You open your eyes to nothing.</p>
        <p>Not darkness — <em>nothing</em>. An absence so complete it has texture, like the space between radio stations. The air hums at a frequency that makes your teeth ache.</p>
        <p>Then, slowly, the world assembles itself. Gray stone underfoot. A sky the color of untuned static. Pillars of pale crystal rising around you in a loose circle, each one humming at a slightly different pitch.</p>
        <p>You're standing on a platform — a crossroads of smooth rock suspended in the void. Paths branch from it in every direction, vanishing into mist before you can see where they lead. Some shimmer with faint color. Others are dark.</p>
        <p class="flavor">"The Threshold is the space between moments. It belongs to no one — and to everyone who has ever been lost between seconds."</p>
        <p>At the center of the platform, half-buried in the stone, something pulses with a faint blue light.</p>
    `,
    choices: [
        {
            label: 'Reach for the pulsing light',
            hint: 'Something is embedded in the stone.',
            next: 'threshold_core'
        },
        {
            label: 'Look around first',
            hint: 'Study the crossroads before touching anything.',
            next: 'threshold_observe'
        }
    ]
};

// ── 1.2: Observe the Threshold ──
SCENES['threshold_observe'] = {
    location: 'The Threshold',
    onEnter: () => { addKnowledge(1); },
    text: `
        <p>You take a breath — if this place even has air — and look.</p>
        <p>Six paths extend from the platform. Each one carries a different quality:</p>
        <p>One shimmers with <strong style="color:var(--chrome)">silver light</strong>, clean and precise. Another breathes with <strong style="color:var(--green)">living green</strong>, vines creeping along its edges. A third radiates <strong style="color:var(--orange)">amber warmth</strong>, like looking toward a distant sun.</p>
        <p>The remaining three: one cloaked in <strong style="color:var(--purple)">deep violet shadow</strong>; one seamed with veins of <strong style="color:var(--gold)">molten gold</strong>; one paved in <strong style="color:var(--blue)">luminous blue stone</strong>, impossibly even.</p>
        <p>The crystal pillars seem to mark the paths. Each hums a different note, and where two notes overlap, the air shimmers like heat haze.</p>
        <p>At the center of it all — that pulsing light. Undeniable. Patient.</p>
        <div class="system-message">+1 Knowledge — You studied your surroundings before acting.</div>
    `,
    choices: [
        {
            label: 'Reach for the pulsing light',
            hint: 'It has waited long enough.',
            next: 'threshold_core'
        }
    ]
};

// ── 1.3: The Chrono Core ──
SCENES['threshold_core'] = {
    location: 'The Threshold',
    onEnter: () => {
        addItem('Dormant Chrono Core');
        setFlag('has_core', true);
    },
    text: `
        <p>Your fingers close around something cold and smooth — a crystalline ovoid no larger than a fist, its surface etched with hairline fractures that glow faintly blue. It comes free from the stone with a sound like a sigh.</p>
        <p>The moment you hold it, the humming stops.</p>
        <p>The silence is enormous. Then the Core shivers in your palm and projects a single image into the air between you and the nearest pillar: a branching tree of light, splitting and splitting and splitting, each branch a different color, each one a different <em>when</em>.</p>
        <div class="lore-note">Chrono Core — A portable time-displacement device. Each dive punches a hole through causality, generating neutrino-scale energy called Flux. Cores are the most dangerous and most coveted technology in the braided multiverse.</div>
        <p>The tree of light fades. The Core's glow settles to a steady, patient pulse, synchronized to your heartbeat.</p>
        <p>From somewhere — everywhere — a voice. Not sound exactly. More like words pressed into the still air, arriving fully formed in your mind:</p>
        <div class="speaker">The Archivist</div>
        <div class="dialogue">"Another one. Lost between the folds. Don't worry — the disorientation passes. The existential dread does not."</div>
    `,
    choices: [
        {
            label: '"Who are you?"',
            hint: 'Address the voice.',
            next: 'threshold_archivist'
        },
        {
            label: '"Where am I?"',
            hint: 'Demand answers.',
            next: 'threshold_archivist'
        }
    ]
};

// ── 1.4: The Archivist ──
SCENES['threshold_archivist'] = {
    location: 'The Threshold',
    text: `
        <p>A figure steps from behind one of the crystal pillars — or perhaps was always there, and only now allows you to see them. Tall, wrapped in layered robes the color of deep bruises, face hidden beneath a cowl. Their hands are bare, and pale as parchment.</p>
        <div class="speaker">The Archivist</div>
        <div class="dialogue">"I am what's left when names are taken away. An Archivist — a keeper of what others choose to forget. As for where you are..."</div>
        <p>They gesture at the platform, the paths, the humming pillars.</p>
        <div class="dialogue">"The Threshold. Neutral ground. The one place in the braided multiverse where the six powers have agreed — grudgingly — not to kill each other on sight."</div>
        <p>The Archivist pauses, regarding your Core.</p>
        <div class="dialogue">"You're holding a Chrono Core. A time machine small enough to steal. Which is exactly what happened — a scientist named Zel stole the first one, dove to the far future, and shattered causality like a mirror dropped from orbit. Every shard became a timeline. Every timeline became a war."</div>
        <div class="dialogue">"Now six syndicates fight across all of time simultaneously, each one certain they alone can save what's left. And every time one of them dives, the energy — the Flux — feeds something at the end of everything. Something that grows."</div>
        <p>The Archivist's cowl tilts, as if studying you.</p>
        <div class="dialogue">"The question, newcomer, is which direction will you walk?"</div>
    `,
    choices: [
        {
            label: '"Tell me about the six syndicates."',
            hint: 'Learn before you leap.',
            next: 'threshold_briefing'
        },
        {
            label: '"What is the thing that grows?"',
            hint: 'Ask about Soval.',
            next: 'threshold_soval'
        }
    ]
};

// ── 1.5: Soval briefing ──
SCENES['threshold_soval'] = {
    location: 'The Threshold',
    onEnter: () => {
        addKnowledge(2);
        setFlag('lore_soval', 'Soval — The Time Devourer. Not a being but entropy incarnate, coiled at the End of Time. Every Flux-generating dive feeds it. The more the syndicates fight, the faster everything ends.');
    },
