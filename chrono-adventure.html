<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrono CCG — The Braided Path</title>
    <style>
        /* ── Reset ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0f;
            --bg-card: #12121a;
            --text: #c8c8d4;
            --text-dim: #6e6e80;
            --text-bright: #e8e8f0;
            --accent: #4a7cff;
            --border: #2a2a3a;
            --gold: #d4a843;
            --chrome: #a8b4c8;
            --green: #4aad6a;
            --purple: #8a5ec8;
            --orange: #d48a3a;
            --red: #c84a4a;
            --blue: #3a6ad4;
            --flux-color: #ff6b4a;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.7;
            overflow-x: hidden;
        }

        /* ── Layout ── */
        #game-container {
            max-width: 660px;
            margin: 0 auto;
            padding: 16px 20px 60px;
            min-height: 100vh;
        }

        /* ── Header ── */
        #header {
            text-align: center;
            padding: 20px 0 14px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        #header h1 {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 0.12em;
            color: var(--text-bright);
            text-transform: uppercase;
        }

        #header .subtitle {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 2px;
        }

        #status-bar {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .stat {
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .stat-value { color: var(--text); font-weight: 600; }
        .stat-flux .stat-value { color: var(--flux-color); }
        .stat-knowledge .stat-value { color: var(--accent); }

        /* ── Location ── */
        #location-badge {
            text-align: center;
            margin-bottom: 18px;
        }

        #location-badge .location-name {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-dim);
        }

        /* ── Narrative ── */
        #narrative { margin-bottom: 24px; }

        .narrative-block p {
            margin-bottom: 10px;
            color: var(--text);
        }

        .narrative-block .flavor {
            font-style: italic;
            color: var(--text-dim);
            border-left: 2px solid var(--border);
            padding-left: 14px;
            margin: 14px 0;
        }

        .narrative-block .speaker {
            color: var(--text-bright);
            font-weight: 600;
            margin-bottom: 2px;
            margin-top: 8px;
        }

        .narrative-block .dialogue {
            color: var(--text);
            padding-left: 12px;
            border-left: 2px solid var(--accent);
            margin-bottom: 10px;
        }

        .narrative-block .system-message {
            color: var(--accent);
            font-size: 0.82rem;
            text-align: center;
            padding: 8px;
            margin: 14px 0;
        }

        .narrative-block .lore-note {
            color: var(--gold);
            font-size: 0.82rem;
            padding: 8px 0;
            margin: 12px 0;
        }

        /* ── Choices ── */
        #choices {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .choice-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 12px 14px;
            color: var(--text);
            text-align: left;
            cursor: pointer;
            font-size: 0.9rem;
            line-height: 1.5;
            transition: border-color 0.15s, color 0.15s;
        }

        .choice-btn:hover, .choice-btn:focus {
            border-color: var(--accent);
            color: var(--text-bright);
            outline: none;
        }

        .choice-btn .choice-label {
            display: block;
            font-weight: 600;
            margin-bottom: 1px;
        }

        .choice-btn .choice-hint {
            font-size: 0.78rem;
            color: var(--text-dim);
        }

        .choice-btn:hover .choice-hint { color: var(--text); }

        /* Faction hover colors — subtle border only */
        .choice-btn.faction-singularity:hover { border-color: var(--chrome); }
        .choice-btn.faction-lifeblood:hover { border-color: var(--green); }
        .choice-btn.faction-sungrace:hover { border-color: var(--orange); }
        .choice-btn.faction-silence:hover { border-color: var(--purple); }
        .choice-btn.faction-splintergleam:hover { border-color: var(--gold); }
        .choice-btn.faction-phasetide:hover { border-color: var(--blue); }

        /* ── Codex / Journal Panel ── */
        #inventory-toggle {
            position: fixed;
            top: 12px;
            right: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 6px 10px;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.72rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            z-index: 100;
        }

        #inventory-toggle:hover { color: var(--text); border-color: var(--text-dim); }

        #inventory-panel {
            position: fixed;
            top: 0;
            right: -320px;
            width: 300px;
            height: 100vh;
            background: var(--bg);
            border-left: 1px solid var(--border);
            padding: 48px 16px 16px;
            overflow-y: auto;
            transition: right 0.2s ease;
            z-index: 99;
        }

        #inventory-panel.open { right: 0; }

        #inventory-panel h3 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-dim);
            margin-bottom: 10px;
            margin-top: 16px;
        }

        #inventory-panel h3:first-child { margin-top: 0; }

        .inv-section { margin-bottom: 16px; }

        .inv-item {
            font-size: 0.8rem;
            color: var(--text);
            padding: 4px 0;
            border-bottom: 1px solid rgba(42, 42, 58, 0.4);
        }

        .inv-item .inv-label { color: var(--text-dim); }

        /* ── Rep bars (text-based progress) ── */
        .rep-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            padding: 3px 0;
        }

        .rep-name { color: var(--text-dim); width: 90px; flex-shrink: 0; }
        .rep-bar-track {
            flex: 1;
            height: 3px;
            background: var(--border);
            border-radius: 1px;
            overflow: hidden;
        }
        .rep-bar-fill { height: 100%; border-radius: 1px; }
        .rep-val { color: var(--text-dim); width: 24px; text-align: right; font-size: 0.72rem; }

        .rep-singularity { background: var(--chrome); }
        .rep-lifeblood { background: var(--green); }
        .rep-sungrace { background: var(--orange); }
        .rep-silence { background: var(--purple); }
        .rep-splintergleam { background: var(--gold); }
        .rep-phasetide { background: var(--blue); }

        /* ── Codex entry ── */
        .codex-entry {
            font-size: 0.78rem;
            color: var(--text);
            padding: 6px 0;
            border-bottom: 1px solid rgba(42, 42, 58, 0.3);
        }

        .codex-title {
            font-weight: 600;
            color: var(--text-bright);
            cursor: pointer;
        }

        .codex-body {
            color: var(--text-dim);
            font-size: 0.74rem;
            margin-top: 4px;
            display: none;
            line-height: 1.5;
        }

        .codex-entry.open .codex-body { display: block; }

        /* ── Bottom bar ── */
        #save-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg);
            border-top: 1px solid var(--border);
            padding: 8px 16px;
            display: flex;
            justify-content: center;
            gap: 10px;
            z-index: 100;
        }

        .save-btn {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 5px 14px;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.7rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .save-btn:hover { color: var(--text); border-color: var(--text-dim); }

        /* ── Toast ── */
        #toast {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: var(--bg);
            border: 1px solid var(--accent);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 0.8rem;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            z-index: 200;
            pointer-events: none;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            #game-container { padding: 12px 14px 56px; }
            #header { padding: 14px 0 10px; margin-bottom: 14px; }
            #header h1 { font-size: 1rem; }
            .choice-btn { padding: 10px 12px; font-size: 0.88rem; }
            #inventory-panel { width: 85vw; max-width: 300px; }
            #inventory-toggle { top: 8px; right: 8px; padding: 5px 8px; font-size: 0.68rem; }
            #save-bar { padding: 6px 12px; gap: 8px; }
            .save-btn { padding: 4px 10px; font-size: 0.66rem; }
        }

        @media (max-width: 380px) {
            #game-container { padding: 10px 12px 52px; }
            .narrative-block p { font-size: 0.92rem; }
            .choice-btn { font-size: 0.85rem; }
        }

        /* ── Resource progress (hub scenes) ── */
        .resource-progress {
            text-align: center;
            padding: 10px 0;
            margin: 12px 0;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: rgba(18, 18, 26, 0.6);
        }
        .resource-progress .rp-label {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            margin-bottom: 4px;
        }
        .resource-progress .rp-pips {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 4px;
        }
        .resource-progress .rp-pip {
            width: 20px;
            height: 6px;
            border-radius: 2px;
            background: var(--border);
        }
        .resource-progress .rp-pip.filled {
            background: var(--accent);
        }

        /* ── Resource change indicators on choices ── */
        .choice-cost {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 4px;
        }
        .cost-tag {
            font-size: 0.7rem;
            padding: 1px 6px;
            border-radius: 3px;
            font-weight: 600;
            letter-spacing: 0.02em;
        }
        .cost-tag.gain {
            color: #4aad6a;
            background: rgba(74, 173, 106, 0.1);
            border: 1px solid rgba(74, 173, 106, 0.25);
        }
        .cost-tag.loss {
            color: #c84a4a;
            background: rgba(200, 74, 74, 0.1);
            border: 1px solid rgba(200, 74, 74, 0.25);
        }
        .cost-tag.neutral {
            color: var(--text-dim);
            background: rgba(110, 110, 128, 0.1);
            border: 1px solid rgba(110, 110, 128, 0.2);
        }

        /* ── Flux bar ── */
        #flux-bar-container {
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        #flux-bar-track {
            width: 140px;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }
        #flux-bar-fill {
            height: 100%;
            background: var(--flux-color);
            border-radius: 3px;
            transition: width 0.4s ease;
        }
        #flux-bar-fill.low { background: #c84a4a; animation: fluxPulse 1.2s infinite; }
        #flux-bar-fill.critical { background: #ff2222; animation: fluxPulse 0.5s infinite; }
        @keyframes fluxPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .flux-warning {
            text-align: center;
            color: #c84a4a;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            animation: fluxPulse 1.2s infinite;
            margin-top: 4px;
        }

        /* ── Resource change toast animation ── */
        @keyframes resourcePop {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-20px); opacity: 0; }
        }
        .resource-delta {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            z-index: 300;
            pointer-events: none;
        }
        .delta-item {
            font-size: 0.85rem;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 4px;
            animation: resourcePop 1.8s ease-out forwards;
        }
        .delta-item.gain { color: #4aad6a; }
        .delta-item.loss { color: #c84a4a; }

        /* ── Scene banner image ── */
        .scene-banner {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            opacity: 0.85;
        }

        /* ── Visual polish: glow effects ── */
        .faction-glow-singularity { box-shadow: 0 0 20px rgba(168, 180, 200, 0.08); }
        .faction-glow-lifeblood { box-shadow: 0 0 20px rgba(74, 173, 106, 0.08); }
        .faction-glow-sungrace { box-shadow: 0 0 20px rgba(212, 138, 58, 0.08); }
        .faction-glow-silence { box-shadow: 0 0 20px rgba(138, 94, 200, 0.08); }
        .faction-glow-splintergleam { box-shadow: 0 0 20px rgba(212, 168, 67, 0.08); }
        .faction-glow-phasetide { box-shadow: 0 0 20px rgba(58, 106, 212, 0.08); }

        /* ── Header visual polish ── */
        #header h1 {
            background: linear-gradient(135deg, var(--text-bright), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ── Divider line between narrative and choices ── */
        .scene-divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 18px 0 14px;
            opacity: 0.5;
        }

        /* ── Leaderboard styles ── */
        .leaderboard {
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.2em;
            margin: 1.5em 0;
            background: rgba(18, 18, 26, 0.8);
        }
        .leaderboard h3 {
            color: var(--accent);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 12px;
            text-align: center;
        }
        .lb-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            border-bottom: 1px solid rgba(42, 42, 58, 0.3);
        }
        .lb-row:last-child { border-bottom: none; }
        .lb-rank { width: 24px; font-size: 0.75rem; color: var(--text-dim); text-align: center; }
        .lb-name { flex: 1; font-size: 0.82rem; color: var(--text); }
        .lb-bar-track {
            width: 100px;
            height: 5px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }
        .lb-bar-fill { height: 100%; border-radius: 2px; }
        .lb-count { width: 36px; font-size: 0.72rem; color: var(--text-dim); text-align: right; }
        .lb-pct { width: 36px; font-size: 0.7rem; color: var(--text-dim); text-align: right; }

        /* ── CTA banner ── */
        .cta-banner {
            text-align: center;
            padding: 1.5em;
            margin: 1.5em 0;
            border: 1px solid var(--accent);
            border-radius: 8px;
            background: rgba(74, 124, 255, 0.05);
        }
        .cta-banner h3 {
            color: var(--accent);
            font-size: 1.1rem;
            margin-bottom: 8px;
        }
        .cta-banner p {
            color: var(--text-dim);
            font-size: 0.85rem;
            margin-bottom: 12px;
        }
        .cta-btn {
            display: inline-block;
            padding: 10px 28px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            cursor: pointer;
            text-decoration: none;
        }
        .cta-btn:hover { background: #5a8cff; }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="header">
        <h1>The Braided Path</h1>
        <div class="subtitle">A Chrono CCG Interactive Experience &mdash; Coming Soon to Steam & Epic</div>
        <div id="status-bar"></div>
    </div>
    <div id="location-badge"><span class="location-name" id="location-name">...</span></div>
    <div id="narrative"></div>
    <div id="choices"></div>
</div>

<button id="inventory-toggle" onclick="toggleInventory()">Journal</button>
<div id="inventory-panel"></div>

<div id="save-bar">
    <button class="save-btn" onclick="saveGame()">Save</button>
    <button class="save-btn" onclick="loadGame()">Load</button>
    <button class="save-btn" onclick="restartGame()">Restart</button>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════
//  CORE ENGINE
// ═══════════════════════════════════════════════════════════════

const MAX_FLUX = 30;
const FLUX_WARN_THRESHOLD = 8;
const FLUX_CRITICAL_THRESHOLD = 4;

const GameState = {
    currentScene: 'threshold_awaken',
    flux: 0,
    maxFlux: MAX_FLUX,
    knowledge: 0,
    trust: 0,
    reputation: {
        singularity: 0,
        lifeblood: 0,
        sungrace: 0,
        silence: 0,
        splintergleam: 0,
        phasetide: 0
    },
    resources: {
        dataFragments: 0,
        rootTokens: 0,
        energyCells: 0,
        memoryShards: 0,
        kintsuShards: 0,
        tideMarks: 0,
        chronoShards: 0
    },
    inventory: [],
    flags: {},
    taskCounts: {},
    history: [],
    sceneCount: 0,
    diveCount: 0
};

function deepCopy(obj) {
    return JSON.parse(JSON.stringify(obj));
}

let state = deepCopy(GameState);

// ── Toast notification ──
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Save / Load ──
function saveGame() {
    localStorage.setItem('chrono_save', JSON.stringify(state));
    showToast('Progress saved.');
}

function autoSave() {
    localStorage.setItem('chrono_save', JSON.stringify(state));
}

function loadGame() {
    const data = localStorage.getItem('chrono_save');
    if (data) {
        state = JSON.parse(data);
        renderScene(state.currentScene);
        showToast('Progress loaded.');
    } else {
        showToast('No save found.');
    }
}

function tryAutoLoad() {
    const data = localStorage.getItem('chrono_save');
    if (data) {
        try {
            const saved = JSON.parse(data);
            if (saved.currentScene && saved.currentScene !== 'threshold_awaken') {
                state = saved;
                return true;
            }
        } catch(e) {}
    }
    return false;
}

function restartGame() {
    if (confirm('Restart from the beginning? All progress will be lost.')) {
        state = deepCopy(GameState);
        localStorage.removeItem('chrono_save');
        renderScene(state.currentScene);
    }
}

// ── State helpers ──
function setFlag(key, val) { state.flags[key] = val !== undefined ? val : true; }
function getFlag(key) { return state.flags[key]; }
function addItem(item) { if (!state.inventory.includes(item)) state.inventory.push(item); }
function hasItem(item) { return state.inventory.includes(item); }

// Flux economy: dives GENERATE flux; actions on timelines SPEND flux
function addFlux(n) {
    state.flux = Math.max(0, Math.min(state.maxFlux || MAX_FLUX, state.flux + n));
}
function spendFlux(n) {
    state.flux = Math.max(0, state.flux - n);
    if (state.flux <= 0) {
        // Check for Out of Time — but defer to after scene renders
        setTimeout(() => checkOutOfTime(), 100);
    }
}
function diveFlux() {
    // Each dive generates flux — you're punching holes in causality
    const baseGain = 5;
    state.diveCount = (state.diveCount || 0) + 1;
    addFlux(baseGain);
    return baseGain;
}
function checkOutOfTime() {
    if (state.flux <= 0 && state.currentScene !== 'ending_out_of_time'
        && state.currentScene !== 'epilogue'
        && !state.currentScene.startsWith('ending_')
        && !state.currentScene.startsWith('threshold_awaken')
        && state.diveCount > 0) {
        renderScene('ending_out_of_time');
    }
}
function addKnowledge(n) { state.knowledge += n; }
function addTrust(n) { state.trust = (state.trust || 0) + n; }
function addRep(faction, n) {
    state.reputation[faction] = Math.max(0, Math.min(100, (state.reputation[faction] || 0) + n));
}

// ── Resource delta display ──
let pendingDeltas = [];
function trackDelta(label, amount) {
    if (amount !== 0) {
        pendingDeltas.push({ label, amount });
    }
}
function showDeltas() {
    if (pendingDeltas.length === 0) return;
    const container = document.createElement('div');
    container.className = 'resource-delta';
    pendingDeltas.forEach((d, i) => {
        const el = document.createElement('div');
        el.className = 'delta-item ' + (d.amount > 0 ? 'gain' : 'loss');
        el.textContent = (d.amount > 0 ? '+' : '') + d.amount + ' ' + d.label;
        el.style.animationDelay = (i * 0.15) + 's';
        container.appendChild(el);
    });
    document.body.appendChild(container);
    setTimeout(() => container.remove(), 2200);
    pendingDeltas = [];
}

// ── Resource & task helpers ──

function renderInventory() {
    const panel = document.getElementById('inventory-panel');
    let html = '';

    // Stats
    html += '<h3>Status</h3>';
    html += `<div class="inv-item">Flux: <span style="color:var(--flux-color)">${state.flux}/${state.maxFlux || MAX_FLUX}</span> &nbsp; Knowledge: <span style="color:var(--accent)">${state.knowledge}</span>${state.trust > 0 ? ` &nbsp; Trust: <span style="color:var(--green)">${state.trust}</span>` : ''}</div>`;
    if (state.diveCount > 0) {
        html += `<div class="inv-item" style="font-size:0.72rem; color:var(--text-dim)">Dives: ${state.diveCount} &nbsp; Chrono Shards: <span style="color:var(--gold)">${getResource('chronoShards')}</span></div>`;
    }

    // Items
    if (state.inventory.length > 0) {
        html += '<h3>Items</h3>';
        state.inventory.forEach(item => {
            html += `<div class="inv-item">${item}</div>`;
        });
    }

    // Resources
    const anyRes = state.resources && Object.values(state.resources).some(v => v > 0);
    if (anyRes) {
        html += '<h3>Resources</h3>';
        for (const [key, info] of Object.entries(RESOURCE_NAMES)) {
            const val = getResource(key);
            if (val > 0) {
                html += `<div class="inv-item"><span style="color:${info.color}">${info.label}:</span> ${val}</div>`;
            }
        }
    }

    // Reputation — compact bar rows
    const anyRep = Object.values(state.reputation).some(v => v > 0);
    if (anyRep) {
        html += '<h3>Reputation</h3>';
        for (const [key, label] of Object.entries(FACTION_NAMES)) {
            const val = state.reputation[key] || 0;
            if (val > 0 || getFlag('met_' + key)) {
                html += `<div class="rep-row">
                    <span class="rep-name">${label}</span>
                    <div class="rep-bar-track"><div class="rep-bar-fill rep-${key}" style="width:${val}%"></div></div>
                    <span class="rep-val">${val}</span>
                </div>`;
            }
        }
    }

    // Codex — expandable lore entries
    const discovered = Object.keys(CODEX_ENTRIES).filter(k => getFlag(k));
    if (discovered.length > 0) {
        html += '<h3>Codex (' + discovered.length + '/' + Object.keys(CODEX_ENTRIES).length + ')</h3>';

        // Group by faction
        const grouped = {};
        discovered.forEach(key => {
            const entry = CODEX_ENTRIES[key];
            if (!grouped[entry.faction]) grouped[entry.faction] = [];
            grouped[entry.faction].push({ key, ...entry });
        });

        for (const [faction, entries] of Object.entries(grouped)) {
            html += `<div style="color:var(--${faction === 'splintergleam' ? 'gold' : faction === 'silence' ? 'purple' : faction}); font-size:0.68rem; text-transform:uppercase; letter-spacing:0.1em; margin-top:10px; margin-bottom:4px;">${FACTION_NAMES[faction]}</div>`;
            entries.forEach(e => {
                const desc = state.flags[e.key];
                const descText = typeof desc === 'string' ? desc : '';
                html += `<div class="codex-entry" onclick="this.classList.toggle('open')">
                    <div class="codex-title">${e.title}</div>
                    ${descText ? `<div class="codex-body">${descText}</div>` : ''}
                </div>`;
            });
        }
    }

    panel.innerHTML = html;
}

// ── Status bar ──
function renderStatusBar() {
    const bar = document.getElementById('status-bar');
    const sceneId = state.currentScene || '';
    const factionMap = {
        singularity: 'dataFragments', lifeblood: 'rootTokens', sungrace: 'energyCells',
        silence: 'memoryShards', splintergleam: 'kintsuShards', phasetide: 'tideMarks'
    };
    let resourceHtml = '';
    for (const [faction, resKey] of Object.entries(factionMap)) {
        if (sceneId.startsWith(faction + '_') && getResource(resKey) > 0) {
            const info = RESOURCE_NAMES[resKey];
            resourceHtml = `<span class="stat" style="color:${info.color}">${info.label}: <span class="stat-value" style="color:${info.color}">${getResource(resKey)}/3</span></span>`;
            break;
        }
    }

    // Flux bar
    const fluxPct = Math.max(0, Math.min(100, (state.flux / (state.maxFlux || MAX_FLUX)) * 100));
    let fluxClass = '';
    let fluxWarnHtml = '';
    if (state.flux <= FLUX_CRITICAL_THRESHOLD && state.diveCount > 0) {
        fluxClass = 'critical';
        fluxWarnHtml = '<div class="flux-warning">FLUX CRITICAL — STRANDING IMMINENT</div>';
    } else if (state.flux <= FLUX_WARN_THRESHOLD && state.diveCount > 0) {
        fluxClass = 'low';
        fluxWarnHtml = '<div class="flux-warning">Flux reserves low</div>';
    }

    bar.innerHTML = `
        <span class="stat stat-flux">Flux: <span class="stat-value">${state.flux}/${state.maxFlux || MAX_FLUX}</span></span>
        <span class="stat stat-knowledge">Knowledge: <span class="stat-value">${state.knowledge}</span></span>
        ${state.trust > 0 ? `<span class="stat">Trust: <span class="stat-value" style="color:var(--green)">${state.trust}</span></span>` : ''}
        ${resourceHtml}
    `;

    // Flux bar below stats (only show after first dive)
    if (state.diveCount > 0) {
        bar.innerHTML += `
            <div id="flux-bar-container" style="width:100%">
                <span style="font-size:0.65rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.08em;">Flux</span>
                <div id="flux-bar-track">
                    <div id="flux-bar-fill" class="${fluxClass}" style="width:${fluxPct}%"></div>
                </div>
                <span style="font-size:0.65rem; color:var(--flux-color);">${state.flux}</span>
            </div>
            ${fluxWarnHtml}
        `;
    }
}

// ── Build cost tags HTML for a choice ──
function buildCostTags(costs) {
    if (!costs || costs.length === 0) return '';
    let html = '<div class="choice-cost">';
    costs.forEach(c => {
        const cls = c.amount > 0 ? 'gain' : (c.amount < 0 ? 'loss' : 'neutral');
        const prefix = c.amount > 0 ? '+' : '';
        html += `<span class="cost-tag ${cls}">${prefix}${c.amount} ${c.label}</span>`;
    });
    html += '</div>';
    return html;
}

// ── Scene renderer ──
function renderScene(sceneId) {
    state.currentScene = sceneId;
    state.sceneCount++;

    const scene = SCENES[sceneId];
    if (!scene) {
        console.error('Scene not found:', sceneId);
        return;
    }

    // Run scene setup if it has one
    if (scene.onEnter) scene.onEnter();

    // Show resource deltas from onEnter
    showDeltas();

    // Location
    document.getElementById('location-name').textContent = scene.location || '???';

    // Detect faction for glow effect
    const container = document.getElementById('game-container');
    container.className = ''; // reset
    const factions = ['singularity','lifeblood','sungrace','silence','splintergleam','phasetide'];
    for (const f of factions) {
        if (sceneId.startsWith(f + '_')) {
            container.className = 'faction-glow-' + f;
            break;
        }
    }

    // Narrative
    const narrativeEl = document.getElementById('narrative');
    narrativeEl.innerHTML = '';

    // Scene banner image (if scene specifies one)
    if (scene.banner) {
        const img = document.createElement('img');
        img.className = 'scene-banner';
        img.src = scene.banner;
        img.alt = scene.location || '';
        img.onerror = function() { this.style.display = 'none'; };
        narrativeEl.appendChild(img);
    }

    const block = document.createElement('div');
    block.className = 'narrative-block scene-transition';
    block.innerHTML = typeof scene.text === 'function' ? scene.text() : scene.text;
    narrativeEl.appendChild(block);

    // Divider before choices
    const divider = document.createElement('hr');
    divider.className = 'scene-divider';
    narrativeEl.appendChild(divider);

    // Choices
    const choicesEl = document.getElementById('choices');
    choicesEl.innerHTML = '';

    let choices = scene.choices;
    if (typeof choices === 'function') choices = choices();

    if (choices && choices.length > 0) {
        choices.forEach(choice => {
            if (choice.condition && !choice.condition()) return;

            // Check if player can afford the choice
            const canAfford = !choice.costs || choice.costs.every(c => {
                if (c.amount >= 0) return true; // gains always affordable
                if (c.resource === 'flux') return state.flux >= Math.abs(c.amount);
                if (c.resource === 'knowledge') return state.knowledge >= Math.abs(c.amount);
                return true;
            });

            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            if (choice.faction) btn.classList.add('faction-' + choice.faction);
            if (!canAfford) {
                btn.style.opacity = '0.4';
                btn.style.cursor = 'not-allowed';
            }

            let inner = '';
            if (choice.label) inner += `<span class="choice-label">${choice.label}</span>`;
            if (choice.hint) inner += `<span class="choice-hint">${choice.hint}</span>`;
            if (choice.costs) inner += buildCostTags(choice.costs);
            btn.innerHTML = inner || choice.text || '...';

            btn.addEventListener('click', () => {
                if (!canAfford) {
                    showToast('Not enough resources.');
                    return;
                }
                // Apply costs
                if (choice.costs) {
                    choice.costs.forEach(c => {
                        if (c.resource === 'flux') {
                            if (c.amount > 0) addFlux(c.amount);
                            else spendFlux(Math.abs(c.amount));
                        } else if (c.resource === 'knowledge') {
                            addKnowledge(c.amount);
                        } else if (c.resource === 'trust') {
                            addTrust(c.amount);
                        } else if (c.resource === 'rep' && c.faction) {
                            addRep(c.faction, c.amount);
                        } else if (RESOURCE_NAMES[c.resource]) {
                            addResource(c.resource, c.amount);
                        }
                        trackDelta(c.label, c.amount);
                    });
                }
                if (choice.onChoose) choice.onChoose();
                if (choice.next) renderScene(choice.next);
            });

            choicesEl.appendChild(btn);
        });
    }

    renderStatusBar();
    renderInventory();
    autoSave();

    window.scrollTo({ top: 0, behavior: 'smooth' });
}

//  LEADERBOARD SYSTEM

const LEADERBOARD_API = 'https://api.jsonbin.io/v3/b';
const LEADERBOARD_BIN_ID = '67ce0000-0000-0000-0000-000000000000'; // placeholder
const LEADERBOARD_KEY = 'chrono_ccg_leaderboard';

// Local leaderboard (works without API; aggregates across sessions via localStorage)
function getLocalLeaderboard() {
    try {
        return JSON.parse(localStorage.getItem(LEADERBOARD_KEY)) || {};
    } catch (e) { return {}; }
}

function recordEnding(ending) {
    const lb = getLocalLeaderboard();
    lb[ending] = (lb[ending] || 0) + 1;
    localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(lb));
}

function renderLeaderboardHtml() {
    const lb = getLocalLeaderboard();
    const endingNames = {
        singularity: { name: 'The Upload', color: 'var(--chrome)' },
        lifeblood: { name: 'The Cycle', color: 'var(--green)' },
        sungrace: { name: 'The Sun-Lance', color: 'var(--orange)' },
        silence: { name: 'The Severance', color: 'var(--purple)' },
        splintergleam: { name: 'The Gambit', color: 'var(--gold)' },
        phasetide: { name: 'The Convergence', color: 'var(--blue)' },
        refuse: { name: 'The Seventh Path', color: 'var(--text-bright)' },
        out_of_time: { name: 'Out of Time', color: 'var(--red)' }
    };

    const total = Object.values(lb).reduce((a, b) => a + b, 0);
    if (total === 0) return '';

    // Sort by count descending
    const sorted = Object.entries(endingNames)
        .map(([key, info]) => ({ key, ...info, count: lb[key] || 0 }))
        .filter(e => e.count > 0)
        .sort((a, b) => b.count - a.count);

    const maxCount = sorted[0]?.count || 1;

    let rows = sorted.map((e, i) => {
        const pct = total > 0 ? Math.round((e.count / total) * 100) : 0;
        const barWidth = Math.round((e.count / maxCount) * 100);
        return `<div class="lb-row">
            <span class="lb-rank">${i + 1}</span>
            <span class="lb-name" style="color:${e.color}">${e.name}</span>
            <div class="lb-bar-track"><div class="lb-bar-fill" style="width:${barWidth}%; background:${e.color}"></div></div>
            <span class="lb-count">${e.count}</span>
            <span class="lb-pct">${pct}%</span>
        </div>`;
    }).join('');

    return `
        <div class="leaderboard">
            <h3>Ending Leaderboard</h3>
            <div style="text-align:center; font-size:0.7rem; color:var(--text-dim); margin-bottom:10px;">${total} total endings recorded across all playthroughs</div>
            ${rows}
        </div>
    `;
}

document.addEventListener('DOMContentLoaded', () => {
    const resumed = tryAutoLoad();
    renderScene(state.currentScene);
    if (resumed) showToast('Progress restored.');
});

</script>
